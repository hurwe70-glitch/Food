<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطبخنا — دفتر وصفاتنا</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
:root {
  --cream: #fdf8f0; --cream2: #f5ede0;
  --brown: #3d2b1f; --brown2: #6b4c3b;
  --gold: #c8963e; --gold2: #e8b55a;
  --red: #8b2e2e; --muted: #7a5c4a;
  --border: #d4b896; --text: #2a1a12;
  --shadow: rgba(61,43,31,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Naskh Arabic', serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* HEADER */
.site-header { background: var(--brown); position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 20px var(--shadow); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 42px; height: 42px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.logo h1 { font-size: 20px; font-weight: 700; color: var(--cream); }
.logo p { font-size: 11px; color: var(--gold2); }
.btn-add { background: var(--gold); color: var(--brown); border: none; border-radius: 10px; padding: 12px 24px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-add:hover { background: var(--gold2); }

/* HERO */
.hero { background: var(--brown); padding: 50px 24px 40px; text-align: center; }
.hero h2 { font-family: 'Playfair Display', serif; font-size: clamp(24px,5vw,44px); font-style: italic; color: var(--cream); margin-bottom: 10px; }
.hero p { color: var(--gold2); font-size: 15px; }
.stats { display: flex; justify-content: center; gap: 40px; margin-top: 28px; flex-wrap: wrap; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 12px; color: var(--cream2); }

/* FILTERS */
.filters-wrap { background: var(--cream2); border-bottom: 1px solid var(--border); padding: 12px 24px; position: sticky; top: 74px; z-index: 40; }
.filters-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.chip { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-family: inherit; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.chip:hover { border-color: var(--gold); color: var(--brown); }
.chip.active { background: var(--brown); color: var(--cream); border-color: var(--brown); }
.search-wrap { margin-right: auto; }
.search-wrap input { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 7px 16px; font-family: inherit; font-size: 13px; color: var(--text); width: 200px; outline: none; }
.search-wrap input:focus { border-color: var(--gold); }

/* GRID */
.main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
.grid-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 22px; }

/* CARD */
.card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: fadeIn 0.35s ease; }
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px var(--shadow); }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.card-img { position: relative; height: 190px; background: var(--cream2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.card:hover .card-img img { transform: scale(1.05); }
.cat-badge { position: absolute; top: 10px; right: 10px; background: var(--brown); color: var(--cream); font-size: 11px; padding: 3px 10px; border-radius: 10px; }
.star-badge { position: absolute; top: 10px; left: 10px; background: rgba(200,150,62,0.92); color: white; font-size: 11px; padding: 3px 10px; border-radius: 10px; }
.card-body { padding: 16px; }
.card-name { font-size: 17px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
.card-preview { font-size: 13px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; }
.card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.stars { color: var(--gold); font-size: 13px; letter-spacing: 1px; }
.card-date { font-size: 12px; color: var(--muted); }

/* EMPTY / LOADING */
.empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
.empty .icon { font-size: 60px; margin-bottom: 16px; }
.empty h3 { font-size: 20px; color: var(--brown2); margin-bottom: 8px; }

/* OVERLAY */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }

/* MODAL */
.modal { background: var(--cream); border-radius: 20px; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; }
.mhead { padding: 22px 26px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--cream); border-radius: 20px 20px 0 0; z-index: 1; }
.mhead h2 { font-size: 19px; font-weight: 700; color: var(--brown); }
.mclose { background: var(--cream2); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--muted); }
.mbody { padding: 22px 26px; }
.mfoot { padding: 14px 26px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* FORM */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--brown2); margin-bottom: 6px; }
.field input, .field textarea, .field select { width: 100%; background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: inherit; font-size: 14px; color: var(--text); outline: none; resize: vertical; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); }
.field textarea { min-height: 90px; }

.upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 26px; text-align: center; cursor: pointer; color: var(--muted); font-size: 13px; position: relative; transition: all 0.2s; }
.upload-zone:hover { border-color: var(--gold); color: var(--brown2); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone .uicon { font-size: 28px; display: block; margin-bottom: 8px; }
.prev-wrap { position: relative; border-radius: 12px; overflow: hidden; margin-top: 10px; }
.prev-wrap img { width: 100%; max-height: 210px; object-fit: cover; display: block; }
.prev-rm { position: absolute; top: 8px; left: 8px; background: rgba(139,46,46,0.88); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; }
.prog-wrap { background: var(--cream2); border-radius: 6px; height: 6px; overflow: hidden; margin-top: 8px; display: none; }
.prog-bar { height: 100%; background: var(--gold); border-radius: 6px; transition: width 0.3s; }

.star-pick { display: flex; gap: 6px; }
.star-pick button { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--border); transition: color 0.1s, transform 0.1s; }
.star-pick button:hover { transform: scale(1.2); }
.star-pick button.on { color: var(--gold); }

.btn-save { background: var(--brown); color: var(--cream); border: none; border-radius: 10px; padding: 12px 26px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: var(--brown2); }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-cancel { background: white; color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-family: inherit; font-size: 14px; cursor: pointer; }
.btn-del { background: white; color: var(--red); border: 1px solid rgba(139,46,46,0.3); border-radius: 10px; padding: 12px 18px; font-family: inherit; font-size: 14px; cursor: pointer; margin-left: auto; }
.btn-del:hover { background: var(--red); color: white; }

/* VIEW */
.view-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 14px; margin-bottom: 18px; }
.view-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.view-cat { background: var(--cream2); color: var(--brown2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 600; }
.view-stars { font-size: 20px; color: var(--gold); }
.view-date { font-size: 12px; color: var(--muted); margin-right: auto; }
.vsec { margin-bottom: 18px; }
.vsec-title { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.vsec-body { font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
.view-notes { background: rgba(200,150,62,0.08); border-right: 3px solid var(--gold); border-radius: 0 10px 10px 0; padding: 12px 16px; font-size: 14px; line-height: 1.7; color: var(--brown2); font-style: italic; white-space: pre-wrap; }

@media (max-width: 600px) {
  .hero { padding: 36px 16px 28px; }
  .stats { gap: 20px; }
  .search-wrap { width: 100%; order: -1; }
  .search-wrap input { width: 100%; }
  .modal { border-radius: 16px 16px 0 0; max-height: 95vh; align-self: flex-end; }
  .overlay { align-items: flex-end; padding: 0; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🍽️</div>
      <div>
        <h1>مطبخنا</h1>
        <p>دفتر وصفاتنا العائلي</p>
      </div>
    </div>
    <button class="btn-add" onclick="openAdd()">＋ وصفة جديدة</button>
  </div>
</header>

<section class="hero">
  <h2>كل أكلة جربناها وأحببناها</h2>
  <p>محفوظة هنا — نرجعلها متى نبي</p>
  <div class="stats">
    <div><div class="stat-num" id="sTotal">0</div><div class="stat-label">وصفة مجربة</div></div>
    <div><div class="stat-num" id="sFive">0</div><div class="stat-label">حصلت ٥ نجوم</div></div>
    <div><div class="stat-num" id="sCats">0</div><div class="stat-label">نوع مختلف</div></div>
  </div>
</section>

<div class="filters-wrap">
  <div class="filters-inner">
    <button class="chip active" onclick="setFilter('all',this)">الكل</button>
    <button class="chip" onclick="setFilter('five',this)">⭐ خمس نجوم</button>
    <button class="chip" onclick="setFilter('عراقي',this)">عراقي</button>
    <button class="chip" onclick="setFilter('عربي',this)">عربي</button>
    <button class="chip" onclick="setFilter('غربي',this)">غربي</button>
    <button class="chip" onclick="setFilter('حلويات',this)">حلويات</button>
    <button class="chip" onclick="setFilter('مشاوي',this)">مشاوي</button>
    <div class="search-wrap"><input type="text" id="srch" placeholder="🔍 ابحث..." oninput="render()"></div>
  </div>
</div>

<main class="main">
  <div class="grid-label" id="glabel">جميع الوصفات</div>
  <div class="grid" id="grid"><div class="empty"><div class="icon">⏳</div><h3>نحمّل الوصفات...</h3></div></div>
</main>

<!-- ADD MODAL -->
<div class="overlay" id="addOv">
  <div class="modal">
    <div class="mhead">
      <h2 id="addTitle">وصفة جديدة</h2>
      <button class="mclose" onclick="closeAll()">×</button>
    </div>
    <div class="mbody">
      <div class="field"><label>اسم الأكلة *</label><input type="text" id="fName" placeholder="مثال: دولمة بالطماطم"></div>
      <div class="field"><label>النوع</label>
        <select id="fCat">
          <option>عراقي</option><option>عربي</option><option>غربي</option>
          <option>حلويات</option><option>مشاوي</option><option>أخرى</option>
        </select>
      </div>
      <div class="field">
        <label>صورة الأكلة</label>
        <div class="upload-zone" onclick="document.getElementById('fImg').click()">
          <span class="uicon">📷</span>اضغط لاختيار صورة
          <input type="file" id="fImg" accept="image/*" onchange="pickImg(this)">
        </div>
        <div class="prev-wrap" id="prevWrap" style="display:none">
          <img id="prevImg"><button class="prev-rm" onclick="rmImg()">✕</button>
        </div>
        <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
      </div>
      <div class="field"><label>المكونات</label><textarea id="fIng" placeholder="اكتب المكونات..."></textarea></div>
      <div class="field"><label>طريقة التحضير</label><textarea id="fSteps" placeholder="اكتب الخطوات..."></textarea></div>
      <div class="field"><label>ملاحظاتنا ✨</label><textarea id="fNotes" placeholder="سر الطعم أو الفرق..."></textarea></div>
      <div class="field"><label>التقييم</label>
        <div class="star-pick" id="starPick">
          <button type="button" onclick="rate(1)">★</button>
          <button type="button" onclick="rate(2)">★</button>
          <button type="button" onclick="rate(3)">★</button>
          <button type="button" onclick="rate(4)">★</button>
          <button type="button" onclick="rate(5)">★</button>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-del" id="btnDel" onclick="delRecipe()" style="display:none">حذف</button>
      <button class="btn-cancel" onclick="closeAll()">إلغاء</button>
      <button class="btn-save" id="btnSave" onclick="save()">💾 حفظ</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="overlay" id="viewOv">
  <div class="modal">
    <div class="mhead">
      <h2 id="viewTitle">-</h2>
      <button class="mclose" onclick="closeAll()">×</button>
    </div>
    <div class="mbody" id="viewBody"></div>
    <div class="mfoot">
      <button class="btn-del" onclick="delRecipe()">حذف</button>
      <button class="btn-cancel" onclick="closeAll()">إغلاق</button>
      <button class="btn-save" onclick="openEdit()">✏️ تعديل</button>
    </div>
  </div>
</div>

<script>
// ===================== FIREBASE CONFIG =====================
const firebaseConfig = {
  apiKey: "AIzaSyCaG1KMJVIwCxjbuO8W9edPX4HfSJGIC24",
  authDomain: "legend-play-e7504.firebaseapp.com",
  databaseURL: "https://legend-play-e7504-default-rtdb.firebaseio.com",
  projectId: "legend-play-e7504",
  storageBucket: "legend-play-e7504.firebasestorage.app",
  messagingSenderId: "1087702623600",
  appId: "1:1087702623600:web:29af6c7de437e6d3079bb5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ===================== STATE =====================
let recipes = [];
let curFilter = 'all';
let curRating = 0;
let editId = null;
let imgFile = null;

// ===================== LOAD =====================
async function loadRecipes() {
  try {
    const snap = await db.collection('matbakh_recipes').orderBy('ts','desc').get();
    recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    updateStats();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      '<div class="empty"><div class="icon">⚠️</div><h3>تعذّر التحميل</h3><p>' + e.message + '</p></div>';
  }
}

// ===================== RENDER =====================
function render() {
  const q = document.getElementById('srch').value.trim().toLowerCase();
  let list = recipes;
  if (curFilter === 'five') list = list.filter(r => r.rating === 5);
  else if (curFilter !== 'all') list = list.filter(r => r.category === curFilter);
  if (q) list = list.filter(r => r.name.toLowerCase().includes(q) || (r.ingredients||'').toLowerCase().includes(q));

  document.getElementById('glabel').textContent =
    curFilter === 'all' ? 'جميع الوصفات (' + list.length + ')' :
    curFilter === 'five' ? '⭐ خمس نجوم (' + list.length + ')' :
    curFilter + ' (' + list.length + ')';

  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="icon">🍽️</div><h3>ما في وصفات هنا بعد</h3><p>ابدأوا بإضافة أول أكلة!</p></div>';
    return;
  }

  document.getElementById('grid').innerHTML = list.map(r => {
    const st = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
    const img = r.imageUrl
      ? '<img src="' + r.imageUrl + '" alt="' + r.name + '" loading="lazy">'
      : '';
    return '<div class="card" onclick="openView(\'' + r.id + '\')">' +
      '<div class="card-img">' + (img || catEmoji(r.category)) + '<span class="cat-badge">' + (r.category||'') + '</span>' +
      (r.rating===5 ? '<span class="star-badge">★★★★★</span>' : '') + '</div>' +
      '<div class="card-body"><div class="card-name">' + r.name + '</div>' +
      (r.ingredients ? '<div class="card-preview">' + r.ingredients + '</div>' : '') +
      '<div class="card-foot"><span class="stars">' + st + '</span><span class="card-date">' + (r.date||'') + '</span></div>' +
      '</div></div>';
  }).join('');
}

function updateStats() {
  document.getElementById('sTotal').textContent = recipes.length;
  document.getElementById('sFive').textContent = recipes.filter(r=>r.rating===5).length;
  document.getElementById('sCats').textContent = new Set(recipes.map(r=>r.category)).size;
}

function catEmoji(c) {
  return {'عراقي':'🍖','عربي':'🥘','غربي':'🍝','حلويات':'🍰','مشاوي':'🔥','أخرى':'🍽️'}[c]||'🍽️';
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ===================== VIEW =====================
function openView(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  editId = id;
  document.getElementById('viewTitle').textContent = r.name;
  const st = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
  let html = '';
  if (r.imageUrl) html += '<img src="' + r.imageUrl + '" class="view-img">';
  html += '<div class="view-meta"><span class="view-cat">' + r.category + '</span><span class="view-stars">' + st + '</span><span class="view-date">' + (r.date||'') + '</span></div>';
  if (r.ingredients) html += '<div class="vsec"><div class="vsec-title">المكونات</div><div class="vsec-body">' + r.ingredients + '</div></div>';
  if (r.steps) html += '<div class="vsec"><div class="vsec-title">طريقة التحضير</div><div class="vsec-body">' + r.steps + '</div></div>';
  if (r.notes) html += '<div class="vsec"><div class="vsec-title">ملاحظاتنا ✨</div><div class="view-notes">' + r.notes + '</div></div>';
  document.getElementById('viewBody').innerHTML = html;
  document.getElementById('viewOv').classList.add('open');
}

function openEdit() {
  const r = recipes.find(x => x.id === editId);
  if (!r) return;
  closeAll();
  setTimeout(() => {
    document.getElementById('addTitle').textContent = 'تعديل الوصفة';
    document.getElementById('fName').value = r.name||'';
    document.getElementById('fCat').value = r.category||'عراقي';
    document.getElementById('fIng').value = r.ingredients||'';
    document.getElementById('fSteps').value = r.steps||'';
    document.getElementById('fNotes').value = r.notes||'';
    curRating = r.rating||0; updateStars();
    imgFile = null;
    if (r.imageUrl) { document.getElementById('prevImg').src = r.imageUrl; document.getElementById('prevWrap').style.display='block'; }
    else document.getElementById('prevWrap').style.display='none';
    document.getElementById('btnDel').style.display = 'inline-block';
    document.getElementById('addOv').classList.add('open');
  }, 150);
}

// ===================== ADD =====================
function openAdd() {
  editId = null;
  document.getElementById('addTitle').textContent = 'وصفة جديدة';
  document.getElementById('fName').value = '';
  document.getElementById('fCat').value = 'عراقي';
  document.getElementById('fIng').value = '';
  document.getElementById('fSteps').value = '';
  document.getElementById('fNotes').value = '';
  curRating = 0; updateStars();
  imgFile = null;
  document.getElementById('prevWrap').style.display = 'none';
  document.getElementById('fImg').value = '';
  document.getElementById('progWrap').style.display = 'none';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('btnSave').disabled = false;
  document.getElementById('btnSave').textContent = '💾 حفظ';
  document.getElementById('addOv').classList.add('open');
}

// ===================== SAVE =====================
async function save() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('اكتب اسم الأكلة أولاً'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '...يحفظ';

  let imageUrl = editId ? (recipes.find(x=>x.id===editId)?.imageUrl||null) : null;

  if (imgFile) {
    try {
      const ref = storage.ref('matbakh/' + Date.now() + '_' + imgFile.name);
      document.getElementById('progWrap').style.display = 'block';
      const task = ref.put(imgFile);
      await new Promise((res,rej) => {
        task.on('state_changed',
          s => { document.getElementById('progBar').style.width = (s.bytesTransferred/s.totalBytes*100)+'%'; },
          rej,
          async () => { imageUrl = await task.snapshot.ref.getDownloadURL(); res(); }
        );
      });
    } catch(e) {
      alert('فشل رفع الصورة:\n' + e.message);
      btn.disabled = false; btn.textContent = '💾 حفظ';
      return;
    }
  }

  const data = {
    name,
    category: document.getElementById('fCat').value,
    ingredients: document.getElementById('fIng').value.trim(),
    steps: document.getElementById('fSteps').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    rating: curRating,
    imageUrl,
    date: new Date().toLocaleDateString('ar-IQ'),
    ts: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    if (editId) {
      const d = {...data}; delete d.ts;
      d.ts = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('matbakh_recipes').doc(editId).set(d);
    } else {
      await db.collection('matbakh_recipes').add(data);
    }
    closeAll();
    await loadRecipes();
  } catch(e) {
    alert('خطأ في الحفظ:\n' + e.message);
    btn.disabled = false; btn.textContent = '💾 حفظ';
  }
}

// ===================== DELETE =====================
async function delRecipe() {
  if (!editId) return;
  if (!confirm('تريد تحذف هاي الوصفة؟')) return;
  try {
    await db.collection('matbakh_recipes').doc(editId).delete();
    closeAll();
    await loadRecipes();
  } catch(e) { alert('خطأ في الحذف:\n' + e.message); }
}

// ===================== IMAGE =====================
function pickImg(input) {
  const f = input.files[0];
  if (!f) return;
  imgFile = f;
  const rd = new FileReader();
  rd.onload = e => {
    document.getElementById('prevImg').src = e.target.result;
    document.getElementById('prevWrap').style.display = 'block';
  };
  rd.readAsDataURL(f);
}

function rmImg() {
  imgFile = null;
  document.getElementById('prevWrap').style.display = 'none';
  document.getElementById('fImg').value = '';
}

// ===================== STARS =====================
function rate(n) { curRating = n; updateStars(); }
function updateStars() {
  document.querySelectorAll('#starPick button').forEach((b,i) => b.classList.toggle('on', i < curRating));
}

// ===================== UTILS =====================
function closeAll() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
}
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeAll(); });
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeAll(); });

// ===================== START =====================
loadRecipes();
</script>
</body>
</html>
